const fmtDurS=(ms)=>{const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return `${h}h ${String(m).padStart(2,'0')}m`;};
const fmtDurSign=(ms)=>{const sign=ms<0?'-':'+';const a=Math.abs(ms),s=Math.floor(a/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return `${sign}${h}h ${String(m).padStart(2,'0')}m`;};
const fmtTime=(iso)=>new Date(iso).toLocaleTimeString(LOC,{hour:'2-digit',minute:'2-digit'});
const fmtDate=(iso)=>new Date(iso).toLocaleDateString(LOC,{day:'2-digit',month:'2-digit',year:'numeric'});
const fmtNum=(n)=>Number(n).toLocaleString(LOC);

/* ============ small UI ============ */
function Toast({t}){ if(!t) return null;
  return <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 su px-4">
    <div className={"flex items-center gap-3 px-5 py-3 rounded-lg border backdrop-blur shadow-xl text-sm font-medium "+(t.type==='error'?'bg-red-950/80 border-red-500/50 text-red-200':'bg-emerald-950/80 border-emerald-500/50 text-emerald-200')}>{t.msg}</div>
  </div>;
}
function LangSwitcher(){ const {lang,setLang}=useT();
  return <div className="flex items-center gap-1 rounded-md border border-neutral-800 p-1 bg-neutral-900">
    <span className="text-neutral-500 ml-1 hidden sm:block"><Ic n="globe" c="w-3.5 h-3.5"/></span>
    {LANGS.map(({c,l})=><button key={c} onClick={()=>setLang(c)} className={"px-2 py-1 rounded text-xs font-mono font-bold transition-colors "+(lang===c?'btn-accent':'text-neutral-400 hover:text-neutral-100')}>{l}</button>)}
  </div>;
}
function Field({label,children}){return <div className="mb-4"><label className="block text-xs uppercase tracking-widest text-neutral-500 mb-2">{label}</label>{children}</div>;}
function Stat({label,value,accent}){return <div className={"rounded-lg p-4 border "+(accent?'bg-accent-soft border-accent-soft':'bg-neutral-900 border-neutral-800')}><div className="text-[10px] uppercase tracking-widest text-neutral-500 mb-1">{label}</div><div className={"font-display text-2xl "+(accent?'text-accent':'')}>{value}</div></div>;}

/* keypad */
function Keypad({val,onDigit,onBack,onEnter,enterLabel}){
  return <div className="grid grid-cols-3 gap-3 max-w-xs mx-auto">
    {['1','2','3','4','5','6','7','8','9'].map(n=><button key={n} onClick={()=>onDigit(n)} className="font-mono text-2xl py-5 rounded-md bg-neutral-900 hover:bg-neutral-800 border border-neutral-800 active:scale-95 transition-all">{n}</button>)}
    <button onClick={onBack} className="py-5 rounded-md bg-neutral-900 hover:bg-neutral-800 border border-neutral-800 active:scale-95 flex items-center justify-center"><Ic n="back"/></button>
    <button onClick={()=>onDigit('0')} className="font-mono text-2xl py-5 rounded-md bg-neutral-900 hover:bg-neutral-800 border border-neutral-800 active:scale-95">0</button>
    <button onClick={onEnter} disabled={val.length<4} className="btn-accent py-5 rounded-md disabled:opacity-30 flex items-center justify-center font-semibold text-sm">{enterLabel}</button>
  </div>;
}
function Dots({len}){return <div className="flex justify-center gap-3 mb-2">{[0,1,2,3,4,5].slice(0,Math.max(4,len)).map(i=><div key={i} className={"w-3.5 h-3.5 rounded-full transition-all "+(len>i?'accent-dot scale-110':'bg-neutral-800')}/>)}</div>;}

/* km modal */
function KmModal({title,sub,action,onClose,onSubmit}){
  const {t}=useT(); const [km,setKm]=useState(''); const [busy,setBusy]=useState(false);
  const go=async()=>{ if(km===''||isNaN(parseFloat(km))) return; setBusy(true); await onSubmit(parseFloat(km)); setBusy(false); };
  return <div className="fixed inset-0 z-40 bg-black/70 backdrop-blur-sm flex items-end sm:items-center justify-center p-4">
    <div className="bg-neutral-900 border border-neutral-800 rounded-xl w-full max-w-sm su"><div className="p-6">
      <div className="flex items-start justify-between mb-1"><h3 className="font-display text-xl">{title}</h3><button onClick={onClose} className="text-neutral-500"><Ic n="x"/></button></div>
      <p className="text-neutral-500 text-sm mb-6">{sub}</p>
      <div className="relative">
        <input type="number" inputMode="decimal" value={km} onChange={e=>setKm(e.target.value)} placeholder={t('km_ph')} autoFocus className="w-full bg-neutral-950 border border-neutral-800 rounded-md px-4 py-4 font-mono text-2xl focus:border-accent focus:outline-none pr-12"/>
        <span className="absolute right-4 top-1/2 -translate-y-1/2 text-neutral-500 text-sm font-mono">km</span>
      </div>
      <div className="grid grid-cols-2 gap-3 mt-6">
        <button onClick={onClose} className="py-3 rounded-md border border-neutral-800 hover:bg-neutral-800 font-medium">{t('cancel')}</button>
        <button onClick={go} disabled={km===''||busy} className="btn-accent py-3 rounded-md font-semibold disabled:opacity-40">{action}</button>
      </div>
    </div></div>
  </div>;
}

/* ============ ENTRY ============ */
function Entry({onCompany,onAdmin,toast}){
  const {t}=useT(); const [code,setCode]=useState(''); const [busy,setBusy]=useState(false);
  const go=async()=>{ if(!code.trim())return; setBusy(true);
    const {data,error}=await sb.rpc('company_by_code',{p_code:code.trim()});
    setBusy(false);
    if(error||!data||!data.ok){ toast({type:'error',msg:t('invalid_code')}); return; }
    onCompany(data);
  };
  return <div className="su max-w-md mx-auto">
    <div className="mb-10 text-center">
      <div className="text-[11px] text-neutral-500 uppercase tracking-[0.3em] mb-2">{t('entry_kicker')}</div>
      <h1 className="font-display text-4xl">{t('entry_title')}</h1>

          <div className="w-12 h-12 rounded-md bg-neutral-800 group-hover:bg-accent-soft flex items-center justify-center"><Ic n="user" c="w-6 h-6"/></div>

    setActive(a.data.active);
    const h=await sb.rpc('driver_history',{p_token:session.token});
    if(h.data&&h.data.ok) setHist(h.data.shifts||[]);
    setLoading(false);

  useEffect(()=>{load();},[]);

  const stats=useMemo(()=>{const km=hist.reduce((s,x)=>s+(x.end_km-x.start_km),0);const ms=hist.reduce((s,x)=>s+(new Date(x.end_time)-new Date(x.start_time)),0);return {km,ms,n:hist.length};},[hist]);

        <div className="flex items-center gap-2 mb-2"><div className={"w-2 h-2 rounded-full "+(active?'accent-dot blink':'bg-neutral-600')}/><div className="text-xs uppercase tracking-widest text-neutral-400">{active?t('on_shift'):t('free')}</div></div>
        <div className="font-display text-2xl sm:text-3xl">{active?t('shift_active'):t('start_shift_h')}</div></div>
        <span className={active?'text-accent':'text-neutral-700'}><Ic n="act" c="w-8 h-8"/></span></div>
      {active? <>
        <div className="grid grid-cols-2 gap-4 mb-6">
          <div className="bg-neutral-950/50 border border-neutral-800/60 rounded-md p-4"><div className="text-neutral-500 text-xs uppercase tracking-widest mb-2">{t('m_worked')}</div><div className="font-mono text-xl">{fmtDur(elapsed)}</div></div>
          <div className="bg-neutral-950/50 border border-neutral-800/60 rounded-md p-4"><div className="text-neutral-500 text-xs uppercase tracking-widest mb-2">{t('m_started')}</div><div className="font-mono text-xl">{fmtTime(active.start_time)}</div></div>
          <div className="bg-neutral-950/50 border border-neutral-800/60 rounded-md p-4"><div className="text-neutral-500 text-xs uppercase tracking-widest mb-2">{t('m_km_start')}</div><div className="font-mono text-xl">{fmtNum(active.start_km)}</div></div>

        <button onClick={()=>setM('end')} className="btn-accent w-full font-display text-lg py-5 rounded-lg flex items-center justify-center gap-3"><Ic n="stop"/> {t('btn_end')}</button>

    <div className="grid grid-cols-3 gap-3 mt-6">

/* ============ EDIT SHIFT MODAL ============ */
function EditShiftModal({shift, driverName, onClose, onSave}){
  const {t}=useT();
  const toLocal=(iso)=>{ if(!iso) return ''; const d=new Date(iso); const pad=n=>String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`; };
  const [startTime,setStartTime]=useState(toLocal(shift.start_time));
  const [endTime,setEndTime]=useState(toLocal(shift.end_time));
  const [startKm,setStartKm]=useState(String(shift.start_km));
  const [endKm,setEndKm]=useState(String(shift.end_km));
  const [reason,setReason]=useState('');
  const [busy,setBusy]=useState(false);
  const sKm=Number(startKm), eKm=Number(endKm);
  const sT=startTime?new Date(startTime):null, eT=endTime?new Date(endTime):null;
  const timeBad=sT&&eT&&eT<=sT;
  const kmBad=!isNaN(sKm)&&!isNaN(eKm)&&eKm<sKm;
  const valid=!isNaN(sKm)&&!isNaN(eKm)&&!kmBad&&sT&&eT&&!timeBad&&reason.trim().length>=3;
  const submit=async()=>{ if(!valid||busy) return; setBusy(true);
    await onSave({ start_time:new Date(startTime).toISOString(), end_time:new Date(endTime).toISOString(),
      start_km:sKm, end_km:eKm, motiv:reason.trim() }); setBusy(false); };
  return <div className="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4">
    <div className="bg-neutral-900 border border-neutral-800 rounded-t-xl sm:rounded-xl w-full max-w-md max-h-[95vh] flex flex-col su">
      <div className="flex items-start justify-between p-5 sm:p-6 border-b border-neutral-800">

        <button onClick={onClose} className="text-neutral-500 hover:text-neutral-200 ml-3"><Ic n="x"/></button>
      </div>
      <div className="overflow-y-auto p-5 sm:p-6 space-y-4">
        <Field label={t('f_start_time')}>
          <input type="datetime-local" value={startTime} onChange={e=>setStartTime(e.target.value)}
            className="w-full bg-neutral-950 border border-neutral-800 rounded-md px-4 py-3 focus:border-accent focus:outline-none font-mono"/>
        </Field>
        <Field label={t('f_start_km')}>
          <input type="number" inputMode="numeric" value={startKm} onChange={e=>setStartKm(e.target.value)}
            className="w-full bg-neutral-950 border border-neutral-800 rounded-md px-4 py-3 focus:border-accent focus:outline-none font-mono"/>
        </Field>
        <Field label={t('f_end_time')}>
          <input type="datetime-local" value={endTime} onChange={e=>setEndTime(e.target.value)}
            className="w-full bg-neutral-950 border border-neutral-800 rounded-md px-4 py-3 focus:border-accent focus:outline-none font-mono"/>
        </Field>
        <Field label={t('f_end_km')}>
          <input type="number" inputMode="numeric" value={endKm} onChange={e=>setEndKm(e.target.value)}
            className="w-full bg-neutral-950 border border-neutral-800 rounded-md px-4 py-3 focus:border-accent focus:outline-none font-mono"/>
        </Field>
        <Field label={t('f_reason')}>
          <textarea value={reason} onChange={e=>setReason(e.target.value)} rows={3} placeholder={t('f_reason_ph')}
            className="w-full bg-neutral-950 border border-neutral-800 rounded-md px-4 py-3 focus:border-accent focus:outline-none resize-none"/>

      </div>
      <div className="p-5 sm:p-6 border-t border-neutral-800 grid grid-cols-2 gap-3">
        <button onClick={onClose} className="py-3 rounded-md border border-neutral-800 hover:bg-neutral-800 font-medium">{t('cancel')}</button>

    {editingShift&&<EditShiftModal shift={editingShift} driverName={(drivers.find(d=>d.id===editingShift.driver_id)||{}).name||''} onClose={()=>setEditingShift(null)} onSave={async(vals)=>{

      if(upd.error){ toast({type:'error',msg:t('err_save')}); return; }

      setEditingShift(null);
      load();
    }}/>}    {showReport&&<CompanyReportModal drivers={drivers} shifts={shifts} company={company} onClose={()=>setShowReport(false)}/>}
  </div>;
}

      .footer{margin-top:30px;font-size:10px;color:#aaa;border-top:1px solid #eee;padding-top:10px}
    </style></head><body>
      <div class="firma">${company?company.name:''}</div>

        <div className="min-w-0 flex-1">
          <div className="text-[11px] text-accent uppercase tracking-[0.3em] mb-1">{company?company.name:''}</div>
          <h3 className="font-display text-xl sm:text-2xl">{t('company_report')}</h3>
          <div className="text-xs text-neutral-500 mt-1 font-mono">{t('report_period')}: {fmtDate(from+'T00:00:00')} — {fmtDate(to+'T00:00:00')}</div>
        </div>
        <button onClick={onClose} className="text-neutral-500 hover:text-neutral-200 no-print ml-3"><Ic n="x"/></button>
      </div>
      {/* Body */}
      <div className="overflow-y-auto flex-1 p-5 sm:p-6">
        {/* Date pickers */}
        <div className="grid grid-cols-2 gap-3 mb-5 no-print">
          <div>
            <label className="block text-xs uppercase tracking-widest text-neutral-500 mb-2 flex items-center gap-1"><Ic n="cal" c="w-3.5 h-3.5"/> {t('from_date')}</label>
            <input type="date" value={from} onChange={e=>setFrom(e.target.value)} max={to} className="w-full bg-neutral-950 border border-neutral-800 rounded-md px-3 py-2.5 focus:border-accent focus:outline-none font-mono text-sm"/>
          </div>
          <div>
            <label className="block text-xs uppercase tracking-widest text-neutral-500 mb-2 flex items-center gap-1"><Ic n="cal" c="w-3.5 h-3.5"/> {t('to_date')}</label>
            <input type="date" value={to} onChange={e=>setTo(e.target.value)} min={from} max={todayStr} className="w-full bg-neutral-950 border border-neutral-800 rounded-md px-3 py-2.5 focus:border-accent focus:outline-none font-mono text-sm"/>
          </div>
        </div>
        {/* Overall stats */}
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
          <div className="bg-neutral-950 border border-neutral-800 rounded-md p-3"><div className="text-[10px] uppercase tracking-widest text-neutral-500 mb-1">{t('s_drivers')}</div><div className="font-display text-xl">{activeDrivers.length}</div></div>
          <div className="bg-neutral-950 border border-neutral-800 rounded-md p-3"><div className="text-[10px] uppercase tracking-widest text-neutral-500 mb-1">{t('s_shifts')}</div><div className="font-display text-xl">{overall.n}</div></div>
          <div className="bg-neutral-950 border border-neutral-800 rounded-md p-3"><div className="text-[10px] uppercase tracking-widest text-neutral-500 mb-1">{t('s_km')}</div><div className="font-display text-xl">{fmtNum(overall.km.toFixed(0))}</div></div>
          <div className="bg-neutral-950 border border-neutral-800 rounded-md p-3"><div className="text-[10px] uppercase tracking-widest text-neutral-500 mb-1">{t('s_hours')}</div><div className="font-display text-xl">{fmtDurS(overall.ms)}</div></div>
        </div>
        {/* Per-driver summary table */}
        <div className="bg-neutral-950 border border-neutral-800 rounded-md overflow-hidden">
          <div className="grid grid-cols-[1fr_auto_auto] gap-x-6 px-4 py-2.5 bg-neutral-900 text-[10px] uppercase tracking-widest text-neutral-500 font-mono">
            <div>{t('tab_drivers')}</div>
            <div className="text-right">{t('s_hours')}</div>
            <div className="text-right">{t('s_km')}</div>
          </div>
          {activeDrivers.map(d=>{
            const ds=byDriver[d.id]||[];
            const dkm=ds.reduce((a,s)=>a+(s.end_km-s.start_km),0);
            const dms=ds.reduce((a,s)=>a+(new Date(s.end_time)-new Date(s.start_time)),0);
            return <div key={d.id} className="grid grid-cols-[1fr_auto_auto] gap-x-6 px-4 py-3 border-t border-neutral-800 items-center">
              <div className="font-semibold truncate">{d.name}</div>
              <div className="font-mono text-sm text-right whitespace-nowrap">{fmtDurS(dms)}</div>
              <div className="font-mono text-sm text-right text-accent whitespace-nowrap">{dkm.toFixed(0)} km</div>
            </div>;
          })}
        </div>
        {/* Print-only footer */}
        <div className="hidden print:block mt-6 pt-4 border-t border-neutral-300 text-xs text-neutral-500">
          {t('generated_on')} {new Date().toLocaleString(LOC)}
        </div>
      </div>
      {/* Buttons */}
      <div className="p-5 sm:p-6 border-t border-neutral-800 flex gap-3 no-print">
        <button onClick={handlePDF} disabled={overall.n===0} className="flex-1 btn-accent py-3 rounded-md font-semibold disabled:opacity-40 flex items-center justify-center gap-2"><Ic n="dl" c="w-4 h-4"/> Descarca PDF</button>
      </div>
    </div>
  </div>;
}

/* ============ PLATFORM (read-only overview) ============ */
function Platform({onLogout}){
  const {t}=useT(); const [rows,setRows]=useState(null);
  useEffect(()=>{(async()=>{
    const c=await sb.from('companies').select('id,name,code,accent,mark').order('name');
    const out=[];
    for(const co of (c.data||[])){
      const d=await sb.from('drivers').select('id',{count:'exact',head:true}).eq('company_id',co.id);
      out.push({...co,drivers:d.count||0});
    }
    setRows(out);
  })();},[]);
  if(rows===null) return <Spinner/>;
  return <div className="su">
    <div className="mb-6"><div className="text-[11px] text-accent uppercase tracking-[0.3em] mb-1">{t('platform')}</div><h1 className="font-display text-3xl sm:text-4xl">{t('plat_d')}</h1></div>
    <div className="space-y-2">{rows.map(c=><div key={c.id} className="bg-neutral-900 border border-neutral-800 rounded-lg p-4 flex items-center gap-4">
      <div className="w-12 h-12 rounded-md flex items-center justify-center font-display" style={{background:c.accent,color:'#0a0a0a'}}>{c.mark}</div>
      <div className="flex-1"><div className="font-semibold">{c.name}</div><div className="text-xs text-neutral-500 font-mono mt-0.5">{t('code_l')}: {c.code} · {c.drivers} {t('drivers_w')}</div></div>
    </div>)}</div>
  </div>;
}

/* ============ ROOT ============ */
function App(){
  const [lang,setLangS]=useState(ls.get('pontaj_lang')||'ro');
  const [view,setView]=useState('boot');
  const [company,setCompany]=useState(null);
  const [session,setSession]=useState(null);
  const [profile,setProfile]=useState(null);
  const [toast,setToast]=useState(null);
  LOC=LOCALE[lang];
  const t=useMemo(()=>(k)=>{const v=(DICT[lang]&&DICT[lang][k]!==undefined)?DICT[lang][k]:DICT.ro[k];return v===undefined?k:v;},[lang]);
  const setLang=(l)=>{setLangS(l);ls.set('pontaj_lang',l);};
  useEffect(()=>{if(toast){const x=setTimeout(()=>setToast(null),3200);return ()=>clearTimeout(x);}},[toast]);

  // boot: restore driver session or admin session
  useEffect(()=>{(async()=>{
    const ds=ls.get('pontaj_driver');
    if(ds&&ds.token&&ds.expires_at&&new Date(ds.expires_at)>new Date()){
      const a=await sb.rpc('driver_active_shift',{p_token:ds.token});
      if(a.data&&a.data.ok!==false){ setSession(ds); document.documentElement.style.setProperty('--accent',ds.accent||'#f59e0b'); setView('driver'); return; }
      ls.del('pontaj_driver');
    }
    const {data}=await sb.auth.getSession();
    if(data&&data.session){ await loadProfile(); return; }
    setView('entry');
  })();},[]);

  const loadProfile=async()=>{
    const {data:u}=await sb.auth.getUser();
    if(!u||!u.user){ setView('entry'); return; }
    const {data:p}=await sb.from('profiles').select('role,company_id').eq('id',u.user.id).maybeSingle();
    if(!p){ await sb.auth.signOut(); setView('entry'); return; }
    setProfile(p);
    setView(p.role==='platform_admin'?'platform':'admin');
  };
  const driverLogged=(d)=>{ const s={token:d.token,driver_name:d.driver_name,accent:d.accent,expires_at:d.expires_at,company_name:d.company_name};
    ls.set('pontaj_driver',s); setSession(s); document.documentElement.style.setProperty('--accent',d.accent||'#f59e0b'); setView('driver'); };
  const driverLogout=()=>{ ls.del('pontaj_driver'); setSession(null); document.documentElement.style.setProperty('--accent','#f59e0b'); setView('entry'); };
  const adminLogout=async()=>{ await sb.auth.signOut(); setProfile(null); document.documentElement.style.setProperty('--accent','#f59e0b'); setView('entry'); };

  const headerName = view==='driver'? (session&&session.company_name) : (view==='admin'&&profile? '' : null);
  return <LangCtx.Provider value={{lang,setLang,t}}>
    <div className="min-h-screen grid-bg">
      <div className="border-b border-neutral-800/80 bg-neutral-950/80 backdrop-blur sticky top-0 z-30">
        <div className="max-w-5xl mx-auto px-4 sm:px-5 py-4 flex items-center justify-between gap-3">
          <div className="flex items-center gap-3 min-w-0">
            <div className="w-9 h-9 rounded-md bg-neutral-100 text-neutral-950 flex items-center justify-center shrink-0 font-display">P</div>
            <div className="min-w-0"><div className="font-display text-base sm:text-lg leading-none truncate">{(view==='driver'&&session)?session.company_name:'PONTAJ'}</div>
              <div className="text-[10px] text-neutral-500 uppercase tracking-widest mt-0.5 truncate">{t('brand_sub')}</div></div>
          </div>
          <div className="flex items-center gap-2 shrink-0">
            <LangSwitcher/>
            {(view==='driver')&&<button onClick={driverLogout} className="flex items-center gap-2 px-3 py-2 rounded-md border border-neutral-800 hover:border-neutral-600 text-sm"><Ic n="out" c="w-4 h-4"/><span className="hidden sm:inline">{t('logout')}</span></button>}
            {(view==='admin'||view==='platform')&&<button onClick={adminLogout} className="flex items-center gap-2 px-3 py-2 rounded-md border border-neutral-800 hover:border-neutral-600 text-sm"><Ic n="out" c="w-4 h-4"/><span className="hidden sm:inline">{t('logout')}</span></button>}
          </div>
        </div>
      </div>
      <main className="max-w-5xl mx-auto px-4 sm:px-5 py-8">
        {view==='boot'&&<Spinner/>}
        {view==='entry'&&<Entry onCompany={(c)=>{setCompany(c);document.documentElement.style.setProperty('--accent',c.accent||'#f59e0b');setView('driverLogin');}} onAdmin={()=>setView('adminLogin')} toast={setToast}/>}
        {view==='driverLogin'&&company&&<DriverLogin company={company} onLogged={driverLogged} onBack={()=>{setCompany(null);document.documentElement.style.setProperty('--accent','#f59e0b');setView('entry');}} toast={setToast}/>}
        {view==='driver'&&session&&<DriverDash session={session} onLogout={driverLogout} toast={setToast}/>}
        {view==='adminLogin'&&<AdminLogin onIn={loadProfile} onBack={()=>setView('entry')} toast={setToast}/>}
        {view==='admin'&&profile&&<AdminPanel profile={profile} onLogout={adminLogout} toast={setToast}/>}
        {view==='platform'&&<Platform onLogout={adminLogout}/>}
      </main>
      <Toast t={toast}/>
    </div>
  </LangCtx.Provider>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
